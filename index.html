<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Basura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
            padding: 40px 20px;
            gap: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 600px; 
            margin-bottom: 0;
        }

        h1, h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }

        input[type="text"],
        input[type="time"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .mensaje {
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.9em;
            min-height: 20px;
        }

        .list-container {
            margin-top: 20px;
            text-align: left;
        }

        .list-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 30px 0;
        }
    </style>
</head>

<body>
    <div id="section-login" class="container" style="margin-bottom: 20px;">
        <h1>🔐 Iniciar Sesión</h1>
        <form id="form-login">
            <div class="form-group">
                <label for="login-user">Usuario</label>
                <input type="text" id="login-user" placeholder="Ingrese su usuario">
            </div>
            <div class="form-group">
                <label for="login-pass">Contraseña</label>
                <input type="password" id="login-pass" placeholder="********" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>
            <button type="submit">Ingresar</button>
            <div id="mensaje-login" class="mensaje"></div>
        </form>
    </div>

    <div id="section-admin" style="display: none;">
        <div class="container" style="margin-bottom: 20px;">
            <h1>♻️ Panel de Administración - EMSA</h1>

            <h2>1. Registrar Zona de Recolección</h2>
            <form id="form-zona">
                <div class="form-group">
                    <label for="zona-nombre">Nombre de la Zona *</label>
                    <input type="text" id="zona-nombre" placeholder="Ej. Ruta Norte">
                </div>
                <div class="form-group">
                    <label for="zona-barrios">Barrios *</label>
                    <input type="text" id="zona-barrios" placeholder="Ej. Cala Cala, Queru Queru">
                </div>
                <button type="submit">Guardar Zona</button>
                <div id="mensaje-zona" class="mensaje"></div>
            </form>

            <hr>

            <h2>2. Registrar Horarios</h2>
            <form id="form-horario">
                <div class="form-group">
                    <label for="horario-zona">Seleccionar Zona *</label>
                    <select id="horario-zona">
                        <option value="">-- Primero registre una zona --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="horario-dias">Días de Recolección *</label>
                    <input type="text" id="horario-dias" placeholder="Ej. Lunes, Miércoles y Viernes">
                </div>
                <div class="form-group">
                    <label for="horario-hora">Hora aproximada *</label>
                    <input type="time" id="horario-hora">
                </div>
                <button type="submit">Guardar Horario</button>
                <div id="mensaje-horario" class="mensaje"></div>
            </form>

            <hr>
            <h2>Rutas Registradas (Vista Admin)</h2>
            <div id="lista-rutas" class="list-container"></div>

        </div>
    </div>

    <div class="container">
        <h2>3. Vista Ciudadano: Ver horarios del basurero</h2>
        <div class="form-group">
            <label for="consulta-zona">Seleccione su zona</label>
            <select id="consulta-zona">
                <option value="">-- No hay zonas disponibles --</option>
            </select>
        </div>
        <button id="btn-ver-horarios" type="button">Ver Horarios</button>
        <div id="mensaje-consulta-horario" class="mensaje"></div>
        <div id="lista-horarios-ciudadano" class="list-container"></div>

        <hr>

        <h2>4. Vista Ciudadano: Ver zonas de recolección</h2>
        <button id="btn-ver-zonas" type="button">Ver Zonas Disponibles</button>
        <div id="mensaje-ver-zonas" class="mensaje"></div>
        <div id="lista-zonas-ciudadano" class="list-container"></div>
    </div>

    <script type="module" src="./src/basura-presenter.js"></script>
</body>
</html>
